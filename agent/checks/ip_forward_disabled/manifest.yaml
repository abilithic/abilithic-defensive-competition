code: ip_forward_disabled
title: "Nonaktifkan IP Forwarding"
description: "Parameter kernel net.ipv4.ip_forward harus bernilai 0, karena sistem peserta bukan merupakan router dan tidak boleh meneruskan paket antar-jaringan."
