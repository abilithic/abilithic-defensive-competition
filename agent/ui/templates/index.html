<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>abilithic DHC</title>
  <style>
    :root{ --bg:#0a0e1a; --bg2:#0e1424; --card:#141b2e; --fg:#eef2fb; --mut:#8a97b4;
      --line:#232d47; --acc:#5b8cff; --ok:#2fd67f; --warn:#ffb020; --danger:#ff5d5d; }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background-image:radial-gradient(900px 500px at 100% -10%,rgba(91,140,255,.14),transparent),
        radial-gradient(700px 400px at -10% 0%,rgba(47,214,127,.09),transparent);}
    .wrap{max-width:760px;margin:0 auto;padding:36px 22px;min-height:100%}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
    .logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--acc),#6ee7b7);
      display:grid;place-items:center;font-weight:900;color:#071022;font-size:20px}
    .brand h1{margin:0;font-size:22px;font-weight:800}
    .brand .sub{color:var(--mut);font-size:13px}
    .card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);
      border-radius:16px;padding:22px;margin-bottom:18px;box-shadow:0 10px 34px rgba(0,0,0,.4)}
    label{display:block;font-size:13px;color:var(--mut);margin:12px 0 5px;font-weight:600}
    input{width:100%;padding:13px;border-radius:11px;border:1px solid var(--line);background:#0c1220;color:var(--fg);font:inherit}
    input:focus{outline:none;border-color:var(--acc)}
    button{margin-top:18px;width:100%;padding:14px;border:0;border-radius:11px;background:var(--acc);
      color:#fff;font-weight:800;font-size:15px;cursor:pointer}
    button:disabled{opacity:.5}
    .hidden{display:none}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .state{font-size:40px;font-weight:800;line-height:1}
    .timer{font-size:44px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
    .lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
    .scorebig{font-size:56px;font-weight:900;color:var(--acc);line-height:1;font-variant-numeric:tabular-nums}
    .who{color:var(--mut);font-size:14px;margin-top:4px}
    .row{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid var(--line)}
    .row:last-child{border-bottom:0}
    .chk-title{font-weight:600}
    .hint{font-size:12px;color:var(--mut);margin-top:5px;max-width:52ch;padding:8px 10px;
      background:#0c1220;border:1px solid var(--line);border-radius:8px}
    .hint-toggle{font-size:11px;font-weight:700;color:var(--acc);margin-left:8px;
      cursor:pointer;user-select:none}
    .row.has-hint{cursor:pointer}
    .pill{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:#232d47;color:var(--mut)}
    .ok{color:var(--ok)} .warnc{color:var(--warn)} .muted{color:var(--mut)}
    .tag{display:inline-block;font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px}
    .tag.run{background:rgba(47,214,127,.15);color:var(--ok)} .tag.wait{background:rgba(255,176,32,.14);color:var(--warn)}
    .tag.end{background:rgba(91,140,255,.15);color:#7aa2ff}
    .msg{font-size:13px;margin-top:12px}
    .connbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:16px}
    .conn{display:flex;align-items:center;gap:8px;font-size:13px}
    .dot{width:11px;height:11px;border-radius:50%;background:#666;box-shadow:0 0 0 0 rgba(0,0,0,0)}
    .dot.ok{background:var(--ok);box-shadow:0 0 10px var(--ok)}
    .dot.warn{background:var(--warn);box-shadow:0 0 10px var(--warn)}
    .dot.err{background:var(--danger);box-shadow:0 0 10px var(--danger)}
    .btn-refresh{background:#26314e;color:#fff;border:0;border-radius:9px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;margin:0;width:auto;transition:filter .15s}
    .btn-refresh:hover{filter:brightness(1.15)}
    .btn-refresh:active{transform:translateY(1px)}
    .card, .connbar{animation:fadein .25s ease}
    @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .dot{transition:background .25s,box-shadow .25s}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">◈</div>
    <div><h1>abilithic DHC</h1><div class="sub">Defend · Harden · Compete</div></div>
  </div>

  <!-- STATUS KONEKSI + REFRESH -->
  <div class="connbar">
    <div class="conn"><span class="dot" id="dot"></span><span id="conn-text">Menyambung…</span></div>
    <button class="btn-refresh" id="btn-refresh" onclick="doRefresh()" title="Sinkron otomatis tiap beberapa detik — tombol ini cuma untuk memaksa sinkron instan">↻ Sinkron sekarang</button>
  </div>

  <!-- REGISTRASI -->
  <div class="card" id="register-card">
    <div style="font-weight:800;font-size:17px;margin-bottom:2px">Registrasi Peserta</div>
    <div class="muted" style="font-size:13px">Isi data lalu tunggu panitia memulai lomba.</div>
    <label>Nama lengkap</label>
    <input id="name" placeholder="Nama kamu" autofocus>
    <label>Sekolah / Instansi</label>
    <input id="school" placeholder="Opsional">
    <label>Kode Sesi (dari panitia)</label>
    <input id="code" placeholder="mis. DHC-7Q2X" style="text-transform:uppercase">
    <button id="btn-reg" onclick="doRegister()">Daftar</button>
    <div id="reg-msg" class="msg muted"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="card hidden" id="status-card">
    <div class="hero">
      <div>
        <div class="lbl">Status Lomba</div>
        <div class="state" id="state">—</div>
        <div class="who" id="who">—</div>
      </div>
      <div style="text-align:right">
        <div class="lbl">Sisa Waktu</div>
        <div class="timer" id="timer">--:--</div>
        <div style="margin-top:8px"><span class="lbl">Skor</span><div class="scorebig" id="score">0</div></div>
      </div>
    </div>
  </div>

  <!-- CHECKLIST -->
  <div class="card hidden" id="checks-card">
    <div style="font-weight:800;font-size:16px;margin-bottom:8px">Tugas Hardening</div>
    <div id="checks"></div>
  </div>
</div>

<script>
async function doRegister(){
  const btn=document.getElementById('btn-reg'); btn.disabled=true;
  const msg=document.getElementById('reg-msg'); msg.className='msg muted'; msg.textContent='Mendaftar…';
  const body={name:document.getElementById('name').value,
    school:document.getElementById('school').value,
    session_code:document.getElementById('code').value.trim().toUpperCase()};
  try{
    const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(j.ok){ msg.className='msg ok'; msg.textContent='✔ '+(j.message||'Berhasil terdaftar. Menunggu START…'); }
    else { msg.className='msg warnc'; msg.textContent='⚠ '+(j.error||'Gagal'); btn.disabled=false; }
  }catch(e){ msg.className='msg warnc'; msg.textContent='⚠ Tidak bisa menghubungi agent.'; btn.disabled=false; }
}
const STATE_LABEL={waiting:'MENUNGGU',running:'BERLANGSUNG',paused:'JEDA',ended:'SELESAI',registered:'SIAP',init:'—'};
function fmt(s){ if(s==null||s<0)return '--:--'; const m=Math.floor(s/60),x=s%60;
  return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0'); }
function updateConn(st){
  const dot=document.getElementById('dot'), txt=document.getElementById('conn-text');
  let cls='warn', label='Menyambung…';
  if(st.connection==='ok'){
    if(st.last_sync_sec!=null && st.last_sync_sec>40){ cls='warn'; label='Sinkron tertunda ('+st.last_sync_sec+'s lalu)'; }
    else { cls='ok'; label='Terhubung'+(st.last_sync_sec!=null?' · '+st.last_sync_sec+'s lalu':''); }
  } else if(st.connection==='error'){ cls='err'; label='Terputus — coba Sinkron'; }
  else { cls='warn'; label='Menyambung…'; }
  dot.className='dot '+cls; txt.textContent=label;
}
// Hint disembunyikan default, muncul/hilang saat baris soal diklik. Disimpan
// di Set terpisah (bukan cuma class CSS) karena #checks di-render ULANG
// setiap poll (2 detik) -- kalau cuma toggle class, status buka/tutup akan
// ke-reset tiap kali poll jalan. code jadi key supaya tetap konsisten
// walau urutan/isi checks berubah antar-poll.
const openHints = new Set();
function toggleHint(code){
  if(openHints.has(code)) openHints.delete(code); else openHints.add(code);
  renderChecks(lastChecks);
}
let lastChecks = [];
function renderChecks(checks){
  lastChecks = checks;
  document.getElementById('checks').innerHTML = checks.map(c=>{
    const icon=c.passed?'<span class="ok">✔ Selesai</span>':'<span class="warnc">◻ Belum</span>';
    const hasHint = !c.passed && !!c.hint;
    const isOpen = hasHint && openHints.has(c.code);
    const toggleLabel = hasHint ? `<span class="hint-toggle">${isOpen?'▾ sembunyikan':'▸ lihat hint'}</span>` : '';
    const hintBox = isOpen ? `<div class="hint">${c.hint}</div>` : '';
    const rowAttrs = hasHint ? `class="row has-hint" onclick="toggleHint('${c.code}')"` : `class="row"`;
    return `<div ${rowAttrs}><div><div class="chk-title">${c.title||c.code}${toggleLabel}</div>${hintBox}</div>
      <div style="text-align:right;white-space:nowrap">${icon} <span class="pill">+${c.points}</span></div></div>`;
  }).join('');
}
async function doRefresh(){
  const b=document.getElementById('btn-refresh'); b.disabled=true; const old=b.textContent; b.textContent='↻ Menyinkronkan…';
  try{ const st=await (await fetch('/refresh',{method:'POST'})).json(); updateConn(st); await poll(); }
  catch(e){ document.getElementById('dot').className='dot err'; document.getElementById('conn-text').textContent='Gagal sinkron'; }
  finally{ b.disabled=false; b.textContent=old; }
}
async function poll(){
  try{
    const st=await (await fetch('/status')).json();
    updateConn(st);
    if(st.registered){
      document.getElementById('register-card').classList.add('hidden');
      document.getElementById('status-card').classList.remove('hidden');
      document.getElementById('who').textContent=st.name+(st.school?' · '+st.school:'');
      document.getElementById('state').textContent=STATE_LABEL[st.state]||(st.state||'—').toUpperCase();
      document.getElementById('score').textContent=st.score??0;
      const t=document.getElementById('timer'); t.textContent=fmt(st.remaining_sec);
      t.style.color=(st.remaining_sec!=null&&st.remaining_sec<60)?'var(--danger)':'var(--fg)';
    }
    if(st.checks&&st.checks.length){
      document.getElementById('checks-card').classList.remove('hidden');
      renderChecks(st.checks);
    }
  }catch(e){
    document.getElementById('dot').className='dot err';
    document.getElementById('conn-text').textContent='Agent tidak merespons';
  }
}
setInterval(poll,2000); poll();
</script>
</body>
</html>
