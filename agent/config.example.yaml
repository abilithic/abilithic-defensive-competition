# abilithic-agent — konfigurasi (salin ke config.yaml lalu sesuaikan)

# URL portal web (Next.js) — endpoint /v1 ada di bawah URL ini.
# Contoh produksi: https://abilithic-dhc.vercel.app
portal_url: "http://localhost:3000"

# Versi image VM ini (harus cocok dengan yang dikenali server).
image_version: "2024.04"

# Interval polling (detik). Akan dinaikkan otomatis saat WAITING / kena rate limit.
poll_interval_sec: 15

# Port mini web lokal untuk registrasi & status peserta.
local_ui_port: 8080

# Folder penyimpanan state lokal (token, antrian store-and-forward).
state_dir: "/var/lib/abilithic-agent"

# Level log: DEBUG | INFO | WARN | ERROR
log_level: "INFO"
